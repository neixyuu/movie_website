<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies - Watchflix</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #0d0d0f;
      --bg-card: #16161a;
      --bg-card-hover: #1c1c22;
      --text: #e8e8ed;
      --text-muted: #9898a6;
      --accent: #f5c518;
      --border: #2a2a30;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(13, 13, 15, 0.95);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }

    nav { display: flex; gap: 2rem; }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      padding-bottom: 2px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--accent); border-bottom-color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 1rem; }

    .search-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
    }

    .user-info { display: flex; align-items: center; gap: 0.5rem; }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #c9a010);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--bg-dark);
      font-size: 0.75rem;
    }

    /* Main */
    .page-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
    }

    .page-title {
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }

    /* Toolbar: search + genre */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      max-width: 400px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.6rem 1rem 0.6rem 2.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
    }

    .search-wrap input::placeholder { color: var(--text-muted); }

    .search-wrap i {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .genre-select {
      padding: 0.6rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      cursor: pointer;
      min-width: 160px;
    }

    /* Movies grid */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .movie-card {
      background: var(--bg-card);
      border-radius: 10px;
      overflow: hidden;
      transition: background 0.2s, transform 0.2s;
      cursor: pointer;
    }

    .movie-card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-4px);
    }

    .movie-card-poster {
      aspect-ratio: 2/3;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .movie-card-genre {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--accent);
      color: var(--bg-dark);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .movie-card-rating {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.8);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .movie-card-info { padding: 0.75rem; }

    .movie-card-meta {
      display: flex;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .movie-card-meta span { display: flex; align-items: center; gap: 4px; }

    .movie-card-title {
      font-size: 0.95rem;
      font-weight: 600;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Load more */
    .load-more-wrap {
      text-align: center;
      margin: 2rem 0;
    }

    .load-more-btn {
      padding: 0.75rem 2rem;
      background: var(--accent);
      color: var(--bg-dark);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }

    .load-more-btn:hover { opacity: 0.9; }
    .load-more-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading-grid {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }

    .loading-grid.spinner::after {
      content: '';
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(200, 60, 60, 0.2);
      color: #e88;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    /* Detail modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 2rem;
      overflow-y: auto;
    }

    .modal-overlay.active { display: flex; }

    .detail-modal {
      width: 100%;
      max-width: 900px;
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      margin: auto;
      max-height: 90vh;
      overflow-y: auto;
    }

    .detail-modal-backdrop {
      height: 280px;
      background-size: cover;
      background-position: center;
      position: relative;
      filter: brightness(0.6);
    }

    .detail-modal-backdrop::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--bg-card) 0%, transparent 60%);
    }

    .detail-modal-body { padding: 1.5rem 2rem 2rem; }

    .detail-modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .detail-modal h1 {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .detail-meta .rating { color: var(--accent); font-weight: 600; }

    .detail-overview {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
      line-height: 1.6;
    }

    .detail-section-title {
      font-size: 1rem;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
    }

    .trailers-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .trailer-thumb {
      width: 120px;
      height: 68px;
      border-radius: 6px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .trailer-thumb:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .play-trailer-btn {
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: var(--bg-dark);
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .play-trailer-btn:hover { opacity: 0.9; }

    .review-item {
      background: var(--bg-dark);
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
    }

    .review-author {
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .review-content { color: var(--text-muted); line-height: 1.5; }

    /* Video modal (YouTube) */
    .video-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 2rem;
    }

    .video-modal-overlay.active { display: flex; }

    .video-modal-content {
      width: 100%;
      max-width: 900px;
      position: relative;
    }

    .video-modal-close {
      position: absolute;
      top: -44px;
      right: 0;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 8px;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">Watchflix</a>
    <nav>
      <a href="/">Home</a>
      <a href="/movies" class="active">Movies</a>
      <a href="#tv">TV Show</a>
      <a href="#video">Video</a>
      <a href="#faq">FAQ</a>
      <a href="#pricing">Pricing</a>
      <a href="#contact">Contact Us</a>
    </nav>
    <div class="header-right">
      <button class="search-btn" aria-label="Search"><i class="fas fa-search"></i></button>
      <div class="user-info">
        <div class="user-avatar">JG</div>
        <span>Jane Doe muehehe</span>
      </div>
    </div>
  </header>

  <main class="page-container">
    <h1 class="page-title">All Movies</h1>

    <div class="toolbar">
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search movies..." autocomplete="off">
      </div>
      <select class="genre-select" id="genreSelect">
        <option value="">All Genres</option>
      </select>
    </div>

    <div class="movies-grid" id="moviesGrid">
      <div class="loading-grid spinner">Loading movies...</div>
    </div>

    <div class="load-more-wrap" id="loadMoreWrap" style="display: none;">
      <button type="button" class="load-more-btn" id="loadMoreBtn">Load More</button>
    </div>
  </main>

  <!-- Detail modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="detail-modal">
      <div class="detail-modal-backdrop" id="detailBackdrop"></div>
      <button type="button" class="detail-modal-close" id="closeDetailModal" aria-label="Close">&times;</button>
      <div class="detail-modal-body">
        <h1 id="detailTitle">-</h1>
        <div class="detail-meta" id="detailMeta"></div>
        <p class="detail-overview" id="detailOverview">-</p>
        <p class="detail-section-title">Trailers</p>
        <button type="button" class="play-trailer-btn" id="detailPlayTrailer" style="display: none;">
          <i class="fas fa-play"></i> Play Trailer
        </button>
        <div class="trailers-row" id="detailTrailersRow"></div>
        <p class="detail-section-title">Review</p>
        <div id="detailReviewsList"></div>
      </div>
    </div>
  </div>

  <!-- Video modal -->
  <div class="video-modal-overlay" id="videoModal">
    <div class="video-modal-content">
      <button type="button" class="video-modal-close" id="closeVideoModal">&times;</button>
      <div class="video-wrapper">
        <iframe id="trailerIframe" src="" title="Trailer" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <script>
    const TMDB_OPTIONS = {
      method: 'GET',
      headers: {
        accept: 'application/json',
        Authorization: 'Bearer eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI2MWNkOWVhOWU2NmEyNGEyYjM1M2UxNjZlN2VjMDNhYSIsIm5iZiI6MTY4MzcyMjI4MS41OTMsInN1YiI6IjY0NWI5MDI5NmFhOGUwMDBmZjVjNzNmNyIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.f5OrpMLcDq9qL2ouiXR5yY9OtmALAWFUOHl_BjGOgp0'
      }
    };
    const TMDB_BASE = 'https://api.themoviedb.org/3';
    const IMG_BASE = 'https://image.tmdb.org/t/p';

    function getImgUrl(path, size = 'w500') {
      if (!path) return 'https://via.placeholder.com/500x281?text=No+Image';
      return `${IMG_BASE}/${size}${path}`;
    }

    async function tmdb(path) {
      const sep = path.includes('?') ? '&' : '?';
      const url = `${TMDB_BASE}${path}${sep}language=en-US`;
      const res = await fetch(url, TMDB_OPTIONS);
      if (!res.ok) throw new Error('TMDB request failed');
      return res.json();
    }

    function formatRuntime(mins) {
      if (!mins) return '-';
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return h ? `${h} hr ${m} min` : `${m} min`;
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s ?? '';
      return div.innerHTML;
    }

    let genreMap = {};
    let currentPage = 1;
    let totalPages = 1;
    let currentGenre = '';
    let searchQuery = '';
    let searchTimeout = null;

    async function loadGenres() {
      const data = await tmdb('/genre/movie/list');
      const select = document.getElementById('genreSelect');
      (data.genres || []).forEach(g => {
        genreMap[g.id] = g.name;
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = g.name;
        select.appendChild(opt);
      });
    }

    function getGenreName(genreIds) {
      if (!genreIds || !genreIds.length) return 'Film';
      return genreMap[genreIds[0]] || 'Film';
    }

    function renderCard(m) {
      const title = m.title || '';
      const poster = m.poster_path || m.backdrop_path;
      const rating = m.vote_average != null ? m.vote_average.toFixed(1) : '-';
      return `
        <article class="movie-card" data-id="${m.id}">
          <div class="movie-card-poster" style="background-image: url(${getImgUrl(poster, 'w500')})">
            <span class="movie-card-genre">${escapeHtml(getGenreName(m.genre_ids))}</span>
            <span class="movie-card-rating"><i class="fas fa-star"></i> ${rating}</span>
          </div>
          <div class="movie-card-info">
            <div class="movie-card-meta">
              <span><i class="far fa-calendar"></i> ${(m.release_date || '').slice(0, 4) || '-'}</span>
              <span><i class="far fa-thumbs-up"></i> ${(m.vote_count || 0).toLocaleString()}</span>
            </div>
            <h3 class="movie-card-title">${escapeHtml(title)}</h3>
          </div>
        </article>`;
    }

    async function fetchMovies(page = 1, append = false) {
      const grid = document.getElementById('moviesGrid');
      if (!append) {
        grid.innerHTML = '<div class="loading-grid spinner">Loading movies...</div>';
      }

      try {
        let url;
        if (searchQuery) {
          url = `/search/movie?query=${encodeURIComponent(searchQuery)}&page=${page}`;
        } else if (currentGenre) {
          url = `/discover/movie?with_genres=${currentGenre}&page=${page}`;
        } else {
          url = `/movie/popular?page=${page}`;
        }

        const data = await tmdb(url);
        const list = data.results || [];
        totalPages = data.total_pages || 1;
        currentPage = page;

        if (!append) {
          grid.innerHTML = '';
        }
        list.forEach(m => {
          const article = document.createElement('article');
          article.className = 'movie-card';
          article.dataset.id = m.id;
          article.innerHTML = `
            <div class="movie-card-poster" style="background-image: url(${getImgUrl(m.poster_path || m.backdrop_path, 'w500')})">
              <span class="movie-card-genre">${escapeHtml(getGenreName(m.genre_ids))}</span>
              <span class="movie-card-rating"><i class="fas fa-star"></i> ${(m.vote_average != null ? m.vote_average.toFixed(1) : '-')}</span>
            </div>
            <div class="movie-card-info">
              <div class="movie-card-meta">
                <span><i class="far fa-calendar"></i> ${(m.release_date || '').slice(0, 4) || '-'}</span>
                <span><i class="far fa-thumbs-up"></i> ${(m.vote_count || 0).toLocaleString()}</span>
              </div>
              <h3 class="movie-card-title">${escapeHtml(m.title || '')}</h3>
            </div>`;
          article.onclick = () => openDetail(m.id);
          grid.appendChild(article);
        });

        const loadMoreWrap = document.getElementById('loadMoreWrap');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        if (currentPage < totalPages && list.length > 0) {
          loadMoreWrap.style.display = 'block';
          loadMoreBtn.disabled = false;
          loadMoreBtn.onclick = () => fetchMovies(currentPage + 1, true);
        } else {
          loadMoreWrap.style.display = 'none';
        }
      } catch (e) {
        grid.innerHTML = '<p class="error-msg">Failed to load movies. Please check your TMDB token.</p>';
        document.getElementById('loadMoreWrap').style.display = 'none';
      }
    }

    async function openDetail(movieId) {
      const modal = document.getElementById('detailModal');
      const detail = await tmdb(`/movie/${movieId}?append_to_response=videos,reviews`);

      document.getElementById('detailBackdrop').style.backgroundImage = `url(${getImgUrl(detail.backdrop_path, 'w780')})`;
      document.getElementById('detailTitle').textContent = detail.title || '-';
      document.getElementById('detailOverview').textContent = detail.overview || 'No description available.';

      const metaHtml = [
        `<span><strong>Genre:</strong> ${(detail.genres || []).map(g => g.name).join(', ') || '-'}</span>`,
        `<span><strong>Duration:</strong> ${formatRuntime(detail.runtime)}</span>`,
        `<span class="rating"><strong>Rating:</strong> ${(detail.vote_average != null ? detail.vote_average.toFixed(1) : '-')}</span>`,
        `<span><strong>Release:</strong> ${(detail.release_date || '-').slice(0, 4)}</span>`
      ].join('');
      document.getElementById('detailMeta').innerHTML = metaHtml;

      const videos = (detail.videos?.results || []).filter(v => v.site === 'YouTube');
      const trailersRow = document.getElementById('detailTrailersRow');
      const playBtn = document.getElementById('detailPlayTrailer');
      trailersRow.innerHTML = '';
      if (videos.length) {
        playBtn.style.display = 'inline-flex';
        playBtn.onclick = () => openTrailer(videos[0].key);
        videos.slice(0, 6).forEach((v, i) => {
          const thumb = document.createElement('div');
          thumb.className = 'trailer-thumb';
          thumb.textContent = `Trailer ${i + 1}`;
          thumb.onclick = () => openTrailer(v.key);
          trailersRow.appendChild(thumb);
        });
      } else {
        playBtn.style.display = 'none';
        trailersRow.innerHTML = '<span style="color: var(--text-muted);">No trailers available.</span>';
      }

      const reviews = detail.reviews?.results || [];
      const reviewsList = document.getElementById('detailReviewsList');
      if (reviews.length) {
        reviewsList.innerHTML = reviews.slice(0, 5).map(r =>
          `<div class="review-item">
            <div class="review-author">${escapeHtml(r.author)}</div>
            <div class="review-content">${escapeHtml(r.content)}</div>
          </div>`
        ).join('');
      } else {
        reviewsList.innerHTML = '<span style="color: var(--text-muted);">No reviews yet.</span>';
      }

      modal.classList.add('active');
    }

    function openTrailer(youtubeKey) {
      document.getElementById('trailerIframe').src = `https://www.youtube.com/embed/${youtubeKey}?autoplay=1`;
      document.getElementById('videoModal').classList.add('active');
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('active');
    }

    function closeVideoModal() {
      document.getElementById('videoModal').classList.remove('active');
      document.getElementById('trailerIframe').src = '';
    }

    document.getElementById('closeDetailModal').onclick = closeDetailModal;
    document.getElementById('detailModal').onclick = function(e) {
      if (e.target === this) closeDetailModal();
    };
    document.getElementById('closeVideoModal').onclick = closeVideoModal;
    document.getElementById('videoModal').onclick = function(e) {
      if (e.target === this) closeVideoModal();
    };

    document.getElementById('genreSelect').onchange = function() {
      currentGenre = this.value || '';
      currentPage = 1;
      fetchMovies(1, false);
    };

    document.getElementById('searchInput').oninput = function() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = this.value.trim();
        currentPage = 1;
        fetchMovies(1, false);
      }, 400);
    };

    (async function init() {
      await loadGenres();
      fetchMovies(1, false);
    })();
  </script>
</body>
</html>
